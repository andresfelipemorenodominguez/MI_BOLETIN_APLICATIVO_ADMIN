<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profesor - MiBoletín</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profesor.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">📘 MiBoletín</div>
        <nav class="menu" aria-label="Navegación principal">
          <button class="menu-item active" data-section="inicio">
            <span>🏠</span><span>Inicio</span>
          </button>
          <button class="menu-item" data-section="notas">
            <span>📝</span><span>Subir Notas</span>
          </button>
          <button class="menu-item" data-section="asistencia">
            <span>✅</span><span>Asistencia</span>
          </button>
          <button class="menu-item" data-section="material">
            <span>📁</span><span>Material</span>
          </button>
          <button class="menu-item" data-section="observador">
            <span>👁</span><span>Observador</span>
          </button>
          <button class="menu-item" data-section="reporte">
            <span>📊</span><span>Reporte General</span>
          </button>
          <button class="menu-item" data-section="agenda">
            <span>📅</span><span>Agenda</span>
          </button>
        </nav>

        <button class="profile" id="profileButton" type="button" aria-label="Abrir perfil">
          <div class="avatar" id="mainAvatar">{{ nombre[:2].upper() if nombre else 'PR' }}</div>
          <div class="profile-info">
            <div class="profile-name" id="mainName">{{ nombre }}</div>
            <div class="profile-email" id="mainEmail">{{ codigo }}</div>
          </div>
        </button>
      </aside>

      <main class="main">
        <header class="main-header">
          <h1 class="main-title">Bienvenido, {{ nombre }}</h1>
          <p class="main-description">Selecciona una sección del menú para comenzar.</p>
        </header>
        <section class="content" id="content"></section>
      </main>
    </div>

    <!-- MODAL PERFIL -->
    <div class="profile-modal" id="profileModal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-content">
        <button class="close-btn" id="closeModal" aria-label="Cerrar">✕</button>
        <h2>Perfil del Usuario</h2>
        <div class="modal-avatar" id="modalAvatar">{{ nombre[:2].upper() if nombre else 'PR' }}</div>
        <h3 class="modal-name" id="modalName">{{ nombre }}</h3>
        <p class="email modal-email" id="modalEmail">{{ codigo }}</p>
        <div class="role">Profesor</div>
        <button class="btn" id="openEdit">Editar Perfil</button>
        <button class="btn" id="openPassword">Cambiar Contraseña</button>
        <div class="dark-mode-row">
          <label for="dark-mode-toggle-prof">
            <span id="dark-icon-prof">🌙</span> Modo Oscuro
          </label>
          <label class="dark-toggle-switch">
            <input type="checkbox" id="dark-mode-toggle-prof">
            <span class="dark-toggle-track"></span>
          </label>
        </div>
        <button class="btn logout" onclick="window.location.href='/logout'">Cerrar Sesión</button>
        <p class="last-access">Código: {{ codigo }}</p>
      </div>
    </div>

    <!-- MODAL EDITAR PERFIL -->
    <div class="edit-modal" id="editModal" aria-hidden="true">
      <div class="edit-content">
        <button class="close-btn" id="closeEdit" aria-label="Cerrar">✕</button>
        <h2>Editar Perfil</h2>
        <div class="edit-avatar" id="previewAvatar">{{ nombre[:2].upper() if nombre else 'PR' }}</div>
        <label>Nombre completo</label>
        <input type="text" id="editName" value="{{ nombre }}" />
        <label>Correo electrónico</label>
        <input type="email" id="editEmail" placeholder="correo@ejemplo.com" />
        <div class="buttons">
          <button class="cancel" id="cancelEdit">Cancelar</button>
          <button class="save" id="saveProfile">Guardar cambios</button>
        </div>
      </div>
    </div>

    <!-- MODAL CAMBIAR CONTRASEÑA -->
    <div class="password-modal" id="passwordModal" aria-hidden="true">
      <div class="password-content">
        <button class="close-btn" id="closePassword" aria-label="Cerrar">✕</button>
        <h2>Cambiar Contraseña</h2>
        <label>Contraseña actual</label>
        <input type="password" id="currentPassword" placeholder="Ingresa tu contraseña actual" />
        <label>Nueva contraseña</label>
        <input type="password" id="newPassword" placeholder="Ingresa la nueva contraseña" />
        <label>Confirmar nueva contraseña</label>
        <input type="password" id="confirmPassword" placeholder="Confirma la nueva contraseña" />
        <div class="buttons">
          <button class="cancel" id="cancelPassword">Cancelar</button>
          <button class="save" id="savePassword">Cambiar contraseña</button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script/profesor.js') }}"></script>
    <script>
    // ── MODO OSCURO PROFESOR ──
    (function() {
        const html = document.querySelector('html');
        const KEY  = 'miboletin_dark_mode';
        const sys  = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

        function applyTheme(dark) {
            html.classList.toggle('dark-mode', dark);
            const chk  = document.getElementById('dark-mode-toggle-prof');
            const icon = document.getElementById('dark-icon-prof');
            if (chk)  chk.checked   = dark;
            if (icon) icon.textContent = dark ? '☀️' : '🌙';
        }

        function resolveTheme() {
            const saved = localStorage.getItem(KEY);
            return saved !== null ? saved === 'true' : sys();
        }

        applyTheme(resolveTheme());

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (localStorage.getItem(KEY) === null) applyTheme(e.matches);
        });

        // Sincronizar checkbox cuando se abre el modal
        document.getElementById('profileButton')?.addEventListener('click', () => {
            const chk = document.getElementById('dark-mode-toggle-prof');
            if (chk) chk.checked = html.classList.contains('dark-mode');
        });

        document.addEventListener('change', e => {
            if (e.target.id !== 'dark-mode-toggle-prof') return;
            localStorage.setItem(KEY, e.target.checked);
            applyTheme(e.target.checked);
        });
    })();
    </script>
</body>
</html>
